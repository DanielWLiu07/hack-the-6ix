<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Battery, not Blood - painterly apple mark. Matches the landing scene's
       apple: red body with a darker ink outline, leaf-green leaf, on transparent.
       Bold shapes so it stays legible at 16px. -->
  <!-- leaf -->
  <path d="M16.4 8.4c1-2.7 3.5-4.1 6.3-4.2.2 2.8-1.1 5.4-3.7 6.2-1.7.5-3.2-.4-2.6-2z"
        fill="#46a758" stroke="#2c6b38" stroke-width="1.1" stroke-linejoin="round"/>
  <!-- stem -->
  <path d="M15.5 9.6c-.2-2.1.2-3.6 1.4-4.9" fill="none"
        stroke="#5b3a22" stroke-width="1.9" stroke-linecap="round"/>
  <!-- apple body (two lobes, hand-drawn wobble) -->
  <path d="M16 10.5c-2.7-2.2-7.6-1.7-9.1 2.8-1.6 4.6 1 12.9 5 14.6 1.7.7 2.4-.6 3.1-.6.7 0 1.4 1.3 3.1.6 4-1.7 6.6-10 5-14.6-1.5-4.5-6.4-5-9.1-2.8z"
        fill="#e5484d" stroke="#8c1f24" stroke-width="1.7" stroke-linejoin="round"/>
  <!-- painterly highlight -->
  <path d="M11 14.6c-1 1.8-1.1 4.3-.2 6.4" fill="none"
        stroke="#f5a3a0" stroke-width="1.5" stroke-linecap="round" opacity="0.75"/>
</svg>
