<!doctype html><html><head><meta charset="utf-8"><style>html,body{margin:0;height:100%;background:#26262b;overflow:hidden}#c{display:block}</style>
<script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.170.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.170.0/examples/jsm/"}}</script></head>
<body><canvas id="c"></canvas>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { MeshoptDecoder } from 'three/addons/libs/meshopt_decoder.module.js';
const url = new URLSearchParams(location.search).get('m') || '/assets/monkey-tpose.glb';
const r = new THREE.WebGLRenderer({canvas:c,antialias:true}); r.setSize(innerWidth,innerHeight); r.setPixelRatio(1);
const scene = new THREE.Scene(); scene.background = new THREE.Color('#2a2a2e');
const cam = new THREE.PerspectiveCamera(35, innerWidth/innerHeight, 0.1, 100);
scene.add(new THREE.HemisphereLight(0xffffff,0x445566,2.2));
const dl = new THREE.DirectionalLight(0xffffff,2.2); dl.position.set(2,4,3); scene.add(dl);
const loader = new GLTFLoader(); loader.setMeshoptDecoder(MeshoptDecoder);
loader.load(url,(g)=>{
  const box=new THREE.Box3().setFromObject(g.scene); const sz=new THREE.Vector3(); box.getSize(sz); const ctr=new THREE.Vector3(); box.getCenter(ctr);
  g.scene.position.sub(ctr); scene.add(g.scene);
  const dist=Math.max(sz.x,sz.y)*1.9;
  cam.position.set(0,0,dist); cam.lookAt(0,0,0);
  window.__bones = []; g.scene.traverse(o=>{ if(o.isBone) window.__bones.push(o.name); });
  window.__ready=true;
},undefined,(e)=>{ document.title='ERR '+e; });
function loop(){ r.render(scene,cam); requestAnimationFrame(loop);} loop();
</script></body></html>
