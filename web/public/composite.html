<!doctype html><html><head><meta charset="utf-8"><style>html,body{margin:0;background:#fff;overflow:hidden}#c{display:block}</style></head>
<body><canvas id="c" width="1440" height="900"></canvas>
<script>
const x=document.getElementById('c').getContext('2d');
x.fillStyle='#ffffff';x.fillRect(0,0,1440,900);
const GREY='#8f8f8f', CREAM='#e6dfd0';
function cap(x0,y0,x1,y1,r,col){x.strokeStyle=col;x.lineCap='round';x.lineWidth=r*2;x.beginPath();x.moveTo(x0,y0);x.lineTo(x1,y1);x.stroke();}
const CX=720;
// neck
x.fillStyle=GREY;x.fillRect(CX-45,300,90,140);
// torso
x.beginPath();x.ellipse(CX,540,160,190,0,0,7);x.fill();
// belly
x.fillStyle=CREAM;x.beginPath();x.ellipse(CX,560,100,140,0,0,7);x.fill();
// arms straight out (T-pose)
cap(CX-120,430,300,430,48,GREY); cap(CX+120,430,1140,430,48,GREY);
x.fillStyle=CREAM;x.beginPath();x.arc(300,430,56,0,7);x.fill();x.beginPath();x.arc(1140,430,56,0,7);x.fill();
// legs
cap(CX-70,690,CX-70,850,52,GREY); cap(CX+70,690,CX+70,850,52,GREY);
x.fillStyle=CREAM;x.beginPath();x.ellipse(CX-70,875,58,34,0,0,7);x.fill();x.beginPath();x.ellipse(CX+70,875,58,34,0,0,7);x.fill();
// head from Suzanne reference, blended (multiply) so its white bg vanishes
const img=new Image();img.onload=()=>{const w=360,h=w*img.height/img.width;x.globalCompositeOperation='multiply';x.drawImage(img,CX-w/2,20,w,h);x.globalCompositeOperation='source-over';window.__done=true;};
img.src='/assets/suzanne-face-reference.png';
</script></body></html>
